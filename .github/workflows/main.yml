name: Ejecutable Automatico
on:
  push:
    [cite_start]branches: [ main ] # Se activa al subir cambios 
  pull_request:
    [cite_start]branches: [ main ] # Se activa al solicitar unión [cite: 12, 41]

jobs:
  build:
    [cite_start]runs-on: windows-latest # Usamos Windows para generar el .exe [cite: 31]
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          [cite_start]python-version: '3.10' [cite: 14, 43]

      - name: Instalar librerias
        run: |
          pip install PySide6 pyinstaller 

      - name: Crear archivo EXE
        run: |
          pyinstaller --onefile --windowed main.py [cite: 16, 46]

      - name: Guardar el ejecutable (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MiApp-Windows
          [cite_start]path: dist/*.exe [cite: 17, 48]